name: Sync Zoom Reports

on:
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync webinar reports from Zoom
        env:
          ZOOM_ACCOUNT_ID: ${{ secrets.ZOOM_ACCOUNT_ID }}
          ZOOM_CLIENT_ID: ${{ secrets.ZOOM_CLIENT_ID }}
          ZOOM_CLIENT_SECRET: ${{ secrets.ZOOM_CLIENT_SECRET }}
          ADMIN_NAME: Abhishek Kumar
          ADMIN_EMAIL: excelbhaiya.systeme.oi@gmail.com
        run: npm run sync:reports

      - name: Back up reports to Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_STORAGE_PREFIX: zoom-attendance
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_KEY" ] || [ -z "$FIREBASE_STORAGE_BUCKET" ]; then
            echo "Firebase secrets not configured. Skipping Firebase backup."
            exit 0
          fi
          npm run backup:firebase

      - name: Commit generated report files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site
          git diff --cached --quiet && exit 0
          git commit -m "Sync Zoom webinar reports"
          git push
